# SpaceSails → esoinila/SpaceSails-play (GitHub Pages), single-player static publish.
#
# The source repo is private and the plan doesn't allow Pages on private repos, so the
# built client is force-pushed to the public build-only repo SpaceSails-play, which serves
# Pages from its main branch. Auth: SSH deploy key (write) on SpaceSails-play, private half
# in this repo's PAGES_DEPLOY_KEY secret. Multiplayer (SpaceSails.Server + SignalR) is
# archived under archive/ — see archive/README.md.

name: Publish to SpaceSails-play

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # The live site is the whole point of AOT (issue #371 Phase 2): this Release publish now
      # AOT-compiles to native wasm, so the descent hitch #371 chased is native, not cold-interpreted.
      # AOT needs the wasm-tools workload (not in the base SDK) and adds ~7+ min to this job.
      - name: Install wasm-tools workload (for AOT)
        run: dotnet workload install wasm-tools

      - name: Publish client
        run: dotnet publish src/SpaceSails.Client -c Release -o publish -p:SpaceSailsPublishAot=true

      - name: Prepare static site (base href, cache-bust CSS, SPA 404, .nojekyll, README)
        run: |
          sed -i 's#<base href="/" />#<base href="/SpaceSails-play/" />#' publish/wwwroot/index.html
          # Cache-bust the stylesheets: the scoped-CSS bundle's b-xxx attributes are regenerated
          # per build, so a browser-cached stale stylesheet against fresh DLLs silently kills all
          # scoped styles (the postage-stamp-map incident). Standalone WASM publish only
          # fingerprints _framework assets, so stamp a per-build query string instead.
          V="${GITHUB_SHA::9}"
          sed -i "s#href=\"lib/bootstrap/dist/css/bootstrap.min.css\"#href=\"lib/bootstrap/dist/css/bootstrap.min.css?v=$V\"#; s#href=\"css/app.css\"#href=\"css/app.css?v=$V\"#; s#href=\"SpaceSails.Client.styles.css\"#href=\"SpaceSails.Client.styles.css?v=$V\"#" publish/wwwroot/index.html
          cp publish/wwwroot/index.html publish/wwwroot/404.html
          touch publish/wwwroot/.nojekyll
          printf '# SpaceSails 🏴‍☠️ — play\n\nA solar-system-scale sailing and piracy game. **Play: https://esoinila.github.io/SpaceSails-play/**\n\nBuilt Blazor WASM artifacts, auto-published from a private source repo.\n' > publish/wwwroot/README.md

      - name: Push build to esoinila/SpaceSails-play
        env:
          DEPLOY_KEY: ${{ secrets.PAGES_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          cd publish/wwwroot
          git init -b main
          git config user.name "spacesails-pages-bot"
          git config user.email "erno.soinila@gmail.com"
          git add -A
          git commit -m "SpaceSails build ${GITHUB_SHA::9}"
          git push --force git@github.com:esoinila/SpaceSails-play.git main
