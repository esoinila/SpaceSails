# SpaceSails → GitHub Pages, single-player static publish (plan §F1, PR-1).
#
# Multiplayer (SpaceSails.Server + SignalR) is archived under archive/ — see
# archive/README.md. The client already builds standalone (single-player is the default;
# ?mp=1 just won't resolve a hub on a static host, which is fine).

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish client
        run: dotnet publish src/SpaceSails.Client -c Release -o publish

      - name: Rewrite base href for the SpaceSails Pages subpath
        run: |
          sed -i 's#<base href="/" />#<base href="/SpaceSails/" />#' publish/wwwroot/index.html

      - name: SPA deep-link fallback (404.html)
        run: cp publish/wwwroot/index.html publish/wwwroot/404.html

      - name: Disable Jekyll processing
        run: touch publish/wwwroot/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
